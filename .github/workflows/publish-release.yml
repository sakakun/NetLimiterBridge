name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore NetLimiterBridge.slnx

    - name: Build Release
      run: msbuild NetLimiterBridge.slnx /p:Configuration=Release /p:Platform="Any CPU"

    - name: Copy NLInterop.dll to Release Output
      run: |
        $src = "$PWD\NetLimiterBridge\NLInterop.dll"
        $dst = "$PWD\NetLimiterBridge\bin\Release\NLInterop.dll"
        if (-Not (Test-Path $src)) {
            Write-Error "NLInterop.dll not found at $src"
        }
        Copy-Item -Path $src -Destination $dst -Force

    - name: Verify Release Folder Contents
      run: Get-ChildItem -Recurse "$PWD\NetLimiterBridge\bin\Release"

    - name: Create Release Artifact
      run: |
        if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
          $tag = '${{ inputs.version }}'
        } else {
          $tag = '${{ github.ref }}'.Replace('refs/tags/', '')
        }
        $artifactName = "NetLimiterBridge-$tag-win-x64.zip"
        Compress-Archive -Path "$PWD\NetLimiterBridge\bin\Release\*" -DestinationPath $artifactName -Force
        echo "ARTIFACT_PATH=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.ARTIFACT_PATH }}
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}