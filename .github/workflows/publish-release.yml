name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore NetLimiterBridge.slnx

    - name: Build Release
      run: msbuild NetLimiterBridge.sln /p:Configuration=Release /p:Platform=x64

    - name: Create Release Artifact
      run: |
        if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
          $tag = '${{ inputs.version }}'
        } else {
          $tag = '${{ github.ref }}'.Replace('refs/tags/', '')
        }
        $artifactName = "NetLimiterBridge-$tag-win-x64.zip"
        Compress-Archive -Path NetLimiterBridge\bin\Release\NetLimiterBridge.exe -DestinationPath $artifactName
        echo "ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "ARTIFACT_PATH=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.ARTIFACT_PATH }}
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
